<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Doable</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">

  <!-- FavIcon -->
  <link rel="icon" href="assets/images/favico.jpg">

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Google Fonts: Nunito -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
</head>
<body>

<!-- ====================NAVIGATION BAR==================== -->
<header class="nav" aria-label="Главная навигация">
  <div class="nav__container">

    <!-- Чекбокс для управления мобильным меню -->
    <input type="checkbox" id="menu-toggle" class="nav__checkbox" aria-label="Открыть меню">

    <div class="nav__top">
      <h1 class="nav__title">Doable</h1>
      <!-- Бургер-иконка -->
      <label for="menu-toggle" class="nav__burger" id="burger-btn" aria-label="Открыть меню">
        <span class="nav__burger--line"></span>
        <span class="nav__burger--line"></span>
        <span class="nav__burger--line"></span>
      </label>
    </div>

    <!-- Меню навигации -->
    <nav class="nav__items" id="nav-menu">
      <div class="nav__item">
        <a href="settings.html" class="nav__button btn" id="settings-btn" aria-label="Открыть Настройки">
          <i class="fa-solid fa-gear btn--icon"></i>
          <span class="nav__text">Настройки</span>
        </a>
      </div>

      <div class="nav__item">
        <a href="diary.html" class="nav__button btn" id="settings-btn" aria-label="Открыть Дневник">
          <i class="fa-solid fa-book btn--icon"></i>
          <span class="nav__text">Дневник</span>
        </a>
      </div>

      <div class="nav__item">
        <button class="nav__button btn" id="theme-btn" data-tooltip="Сменить тему" aria-label="Сменить тему">
          <i class="fa-solid fa-moon btn--icon" id="theme-icon"></i>
          <span class="nav__text">Тема</span>
        </button>
      </div>

      <div class="nav__item nav__item--img" aria-label="Логотип Сайта">
        <img src="assets/images/favico.jpg" alt="Doable Лого">
      </div>
    </nav>
  </div>
</header>

<!-- ====================MAIN APPLICATION================== -->
<main class="container">
  <!-- ==========ЛЕВАЯ КОЛОНКА: Месяц + День========== -->
  <section class="column column--left">

    <!-- БЛОК МЕСЯЦ (цели / глобальные задачи) -->
    <section class="month" id="month" aria-label="Цели на месяц">
      <div class="month__controls">
        <button class="month__btn btn btn--icon" id="month-prev" aria-label="Предыдущий месяц">
          <i class="fa-solid fa-chevron-left"></i>
        </button>
        <h2 class="month__title" id="month-title" aria-label="Текущий месяц"></h2>
        <button class="month__btn month__btn--more btn btn--icon" id="month-toggle-done" aria-label="Показать/скрыть выполненные">
          <i class="fa-solid fa-eye"></i>
        </button>
        <button class="month__btn btn btn--icon" id="month-next" aria-label="Следующий месяц">
          <i class="fa-solid fa-chevron-right"></i>
        </button>
      </div>

      <div class="month__input-wrapper input-wrapper">
        <input 
          type="text" 
          class="input month__input" 
          id="month-input"
          placeholder="Добавить цель (1_ высокий, 2_ средний, 3_ низкий)"
          autocomplete="off"
          aria-label="Добавить цель (1_ высокий, 2_ средний, 3_ низкий)"
        >
        <button class="month__btn btn btn--icon month__add-btn add-btn" id="month-addTask" aria-label="Добавить цель">
          <i class="fa-solid fa-plus"></i>
        </button>
      </div>

      <ul class="month__list" id="month-list"></ul>
    </section>

    <!-- БЛОК ДЕНЬ (ежедневные задачи) -->
    <section class="day" id="day" aria-label="Задачи на день">
      <div class="day__controls">
        <button class="day__btn btn btn--icon" id="day-prev" aria-label="Предыдущий день">
          <i class="fa-solid fa-chevron-left"></i>
        </button>
        <h2 class="day__title" id="day-title" aria-label="Текущий день"></h2>
        <button class="day__btn day__btn--more btn btn--icon" id="day-toggle-done" aria-label="Показать выполненные задачи">
          <i class="fa-solid fa-eye"></i>
        </button>
        <button class="day__btn btn btn--icon" id="day-next" aria-label="Следующий день">
          <i class="fa-solid fa-chevron-right"></i>
        </button>
      </div>

      <div class="day__input-wrapper input-wrapper">
        <input 
          type="text" 
          class="input day__input" 
          id="day-input"
          placeholder="Добавить задачу на день"
          autocomplete="off"
          aria-label="Добавить задачу на день"
        >
        <button class="day__btn btn btn--icon day__add-btn add-btn" id="day-addTask" aria-label="Добавить цель">
          <i class="fa-solid fa-plus" id="day-addTask"></i>
        </button>
      </div>

      <ul class="day__list" id="day-list"></ul>
    </section>
  </section>

  <!-- ==========ПРАВАЯ КОЛОНКА: Календарь + Привычки========== -->
  <section class="column column--right">

    <!-- КАЛЕНДАРЬ с индикаторами задач -->
    <section class="calendar" id="calendar" aria-label="Календарь событий">
      <div class="calendar__controls">
        <button class="calendar__btn btn btn--icon" id="calendar-prev" aria-label="Предыдущий месяц">
          <i class="fa-solid fa-chevron-left"></i>
        </button>
        <h2 class="calendar__title" id="calendar-title" aria-label="Текущий месяц"></h2>
        <button class="calendar__btn btn btn--icon" id="calendar-next" aria-label="Следующий месяц">
          <i class="fa-solid fa-chevron-right"></i>
        </button>
      </div>

      <!-- Заголовки дней недели -->
      <div class="calendar__header">
        <span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span>Сб</span><span>Вс</span>
      </div>

      <!-- Сетка с числами дней -->
      <div class="calendar__grid" id="calendar-grid">
      </div>
    </section>

    <!-- ТРЕКЕР ПРИВЫЧЕК -->
    <section class="habit" id="habit" aria-label="Трекер привычек">
        <div class="habit__header">
          <h2 class="habit__title">Привычки</h2>
          <button class="habit__edit-btn btn btn--icon" id="habit-edit-btn" aria-label="Режим редактирования">
            <i class="fa-solid fa-pencil"></i>
          </button>
        </div>


      <div class="habit__input-wrapper input-wrapper">
        <input 
          type="text" 
          class="input habit__input" 
          id="habit-input"
          placeholder="Добавить привычку (например: Чтение)"
          autocomplete="off"
          aria-label="Добавить привычку"
        >
        <button class="habit__btn btn btn--icon habit__add-btn add-btn" id="habit-addTask" aria-label="Добавить привычку">
          <i class="fa-solid fa-plus"></i>
        </button>
      </div>

      <!-- Сетка привычек -->
      <div class="habit__grid" id="habit-grid"></div>
    </section>

  </section>
</main>

<!-- Подключение основного JS файла -->
<script type="module" src="JS/main.js"></script>
</body>
</html>
